name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stockresearch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install aiosqlite pytest-asyncio httpx ruff black

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --select E,F,I --ignore E501

      - name: Format check with black
        working-directory: backend
        run: black --check app/ --line-length 100

      - name: Run tests
        working-directory: backend
        env:
          MODEL_TYPE: ollama
          OLLAMA_MODEL: llama3.2
          API_KEY: test-ci-key
          NEWSAPI_KEY: test-newsapi-key
          DATABASE_URL: sqlite+aiosqlite:///./test_ci.db
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: development
        run: |
          python -m pytest tests/ -v --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  frontend:
    name: Frontend — lint + type check + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000
          VITE_API_KEY: ci-test-key
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker:
    name: Docker Compose — smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for smoke test
        run: |
          cp .env.example .env
          echo "MODEL_TYPE=ollama" >> .env
          echo "API_KEY=ci-smoke-test-key" >> .env
          echo "NEWSAPI_KEY=placeholder" >> .env

      - name: Build Docker images
        run: docker compose build --no-cache

      - name: Start services
        run: docker compose up -d postgres redis

      - name: Wait for postgres
        run: |
          for i in {1..10}; do
            docker compose exec -T postgres pg_isready -U postgres && break
            sleep 3
          done

      - name: Start backend
        run: docker compose up -d backend

      - name: Health check
        run: |
          sleep 8
          curl -f http://localhost:8000/health || (docker compose logs backend && exit 1)

      - name: Teardown
        if: always()
        run: docker compose down -v
