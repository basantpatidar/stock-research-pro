services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/stockresearch
      - REDIS_URL=redis://redis:6379
      - LOG_DIR=/app/local_debugging
      - TZ=America/New_York
      # Scanner log paths MUST be absolute and inside the mounted volume below.
      # The code's default path resolves relative to the source file — inside
      # this container that lands at /local_debugging (ephemeral, lost on
      # restart, never on the host). These two override it onto the host bind
      # mount so eod_dump.py on the host can read them.
      - SCANNER_HEARTBEAT_LOG=/app/local_debugging/scanner_heartbeat.jsonl
      - NEAR_MISS_LOG=/app/local_debugging/near_miss_log.jsonl
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./local_debugging:/app/local_debugging
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stockresearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
